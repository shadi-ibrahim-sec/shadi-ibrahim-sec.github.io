<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadi Ibrahim — Work & Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06080b;
  --surface:#0d1117;
  --surface2:#131920;
  --border:#1a2030;
  --accent:#00e5ff;
  --accent-dim:rgba(0,229,255,0.08);
  --muted:#536070;
  --body:#8a97a8;
  --text:#c8d4e0;
  --white:#edf2f7;
  --mono:'Space Mono',monospace;
  --sans:'Inter',sans-serif;
}

body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}

#matrix-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;opacity:0.18;pointer-events:none;
}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 56px;
  background:rgba(6,8,11,0.8);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:var(--mono);font-size:13px;color:var(--accent);text-decoration:none}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;text-transform:uppercase}
.nav-links a.active{color:var(--accent)}

.wrap{max-width:1200px;margin:0 auto;padding:140px 56px 100px;position:relative;z-index:1}
.section-eye{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.section-eye::before{content:'';width:24px;height:1px;background:var(--accent)}
h2.section-title{font-size:44px;color:var(--white);margin-bottom:60px}

.work-card {background:var(--surface);border:1px solid var(--border);padding:32px;margin-bottom:40px;position:relative;z-index:1}
.vuln-row {display:flex;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
.badge {font-family:var(--mono);font-size:10px;padding:4px 8px;border:1px solid;text-transform:uppercase;margin-right:20px}
.badge.critical {color:var(--red);border-color:var(--red)}
.badge.high {color:var(--orange);border-color:var(--orange)}
.vuln-title {color:var(--white);font-weight:600}
.description {color:var(--body);font-size:14px;margin:16px 0}
.btn-download {
  display:inline-block;padding:14px 28px;background:var(--white);color:var(--bg);
  font-family:var(--mono);font-size:11px;font-weight:700;text-decoration:none;text-transform:uppercase;
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<nav>
  <a href="index.html" class="nav-logo">shadi_ibrahim<span>.sec</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="work.html" class="active">Work</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="section-eye">Portfolio</div>
  <h2 class="section-title">Security Reports</h2>

  <!-- المربع الأول -->
  <div class="work-card">
      <div class="vuln-row"><span class="badge critical">CRITICAL</span><span class="vuln-title">Unauthorized Admin Panel Access</span></div>
      <div class="btn-container">
          <!-- عدل filename1.pdf لاسم ملفك الحقيقي -->
          <a href="filename1.pdf" class="btn-download" download>↓ DOWNLOAD FULL REPORT</a>
      </div>
  </div>

  <!-- المربع الثاني (الجديد) -->
  <div class="work-card">
      <div class="vuln-row"><span class="badge high">HIGH</span><span class="vuln-title">AI Platform — Race Condition</span></div>
      <div class="description">Bypassed daily usage limits on an AI platform via a Race Condition vulnerability.</div>
      <div class="btn-container">
          <!-- عدل filename2.pdf لاسم ملفك الحقيقي -->
          <a href="filename2.pdf" class="btn-download" download>↓ DOWNLOAD ADDITIONAL REPORT</a>
      </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, cols, drops;
  const chars = '01';
  const fs = 13;
  function init(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cols = Math.floor(W / fs);
    drops = Array(cols).fill(1);
  }
  function draw(){
    ctx.fillStyle = 'rgba(6,8,11,0.05)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00e5ff';
    ctx.font = fs+'px Space Mono, monospace';
    for(let i=0;i<drops.length;i++){
      const c = chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(c, i*fs, drops[i]*fs);
      if(drops[i]*fs > H && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  init();
  window.addEventListener('resize', init);
  setInterval(draw, 60);
})();
</script>
</body>
</html>
